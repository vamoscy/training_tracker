<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Training Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0f; --card: #13131a; --card2: #1a1a24;
  --orange: #f97316; --orange2: #fb923c;
  --green: #22c55e; --blue: #3b82f6; --yellow: #eab308; --purple: #a855f7;
  --text: #f1f5f9; --muted: #64748b; --border: #1e1e2e;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.header { background: linear-gradient(135deg, #0a0a0f 0%, #1a0800 100%); padding: 20px 18px 14px; border-bottom: 1px solid #1e1e2e; position: sticky; top: 0; z-index: 100; }
.header-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; font-weight: 600; }
.header-row { display: flex; align-items: flex-end; justify-content: space-between; }
.header-title { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.header-pct { font-size: 26px; font-weight: 900; color: var(--orange); line-height: 1; }
.header-pct-sub { font-size: 11px; color: var(--muted); text-align: right; }
.progress-bar { margin-top: 10px; background: #1e1e2e; border-radius: 4px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #f97316, #fb923c); border-radius: 4px; transition: width 0.4s ease; }
.save-status { font-size: 11px; margin-top: 5px; text-align: right; height: 14px; transition: opacity 0.3s; }
.settings-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 6px; line-height: 1; border-radius: 8px; transition: color 0.15s; }
.settings-btn:hover { color: var(--text); }

/* WEEK TABS */
.tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); scrollbar-width: none; position: sticky; top: 108px; z-index: 99; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 10px 13px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; position: relative; transition: color 0.15s; }
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.tab.current-dot::after { content: ''; position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; border-radius: 50%; background: var(--orange); }
.tab-done { margin-left: 2px; color: var(--green); }

/* CONTENT */
.content { padding: 14px 14px 100px; }
.week-panel { display: none; }
.week-panel.active { display: block; }

/* WEEK HEADER */
.wk-header { margin-bottom: 12px; }
.wk-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.wk-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.badge { padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.badge-cutback { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-taper { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-race { background: rgba(249,115,22,0.15); color: var(--orange); }
.badge-current { background: rgba(34,197,94,0.15); color: var(--green); }
.wk-goal { font-size: 13px; color: var(--muted); margin-top: 3px; }
.wk-total { font-size: 12px; color: var(--orange); margin-top: 4px; font-weight: 600; }

/* ALERT BOXES */
.alert { border-radius: 12px; padding: 10px 13px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.alert-yellow { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.25); color: #fde68a; }
.alert-blue { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); color: #bfdbfe; }

/* RUN CARDS */
.run-card { border-radius: 13px; margin-bottom: 9px; overflow: hidden; transition: opacity 0.2s; }
.run-card.rest { opacity: 0.5; }
.run-card-top { display: flex; align-items: center; gap: 11px; padding: 12px 13px; cursor: pointer; }
.run-checkbox { width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: #fff; transition: all 0.15s; cursor: pointer; }
.run-checkbox.checked { background: var(--green); border-color: var(--green); }
.run-checkbox.readonly { cursor: default; }
.rest-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.run-info { flex: 1; min-width: 0; }
.run-day { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.run-name { font-size: 14px; font-weight: 700; margin-top: 1px; }
.run-name.crossed { text-decoration: line-through; opacity: 0.5; }
.run-dist { font-size: 12px; color: #94a3b8; margin-top: 1px; }
.run-dist.race-dist { color: var(--orange); }
.run-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.run-speed { font-size: 13px; font-weight: 800; color: var(--text); text-align: right; }
.expand-btn { width: 26px; height: 26px; border-radius: 7px; background: #1e1e2e; border: 1px solid #334155; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: transform 0.2s; }
.expand-btn.open { transform: rotate(180deg); }

/* EXPANDED */
.run-detail { padding: 0 13px 13px; border-top: 1px solid var(--border); }
.run-detail-inner { padding-top: 11px; }
.structure-block { background: #0f0f18; border-radius: 9px; padding: 9px 11px; margin-bottom: 9px; }
.seg-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
.seg-row:last-child { margin-bottom: 0; }
.seg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.seg-text { font-size: 12px; color: #cbd5e1; line-height: 1.5; }
.detail-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 5px; }
.detail-label { font-size: 12px; color: var(--muted); text-transform: capitalize; flex-shrink: 0; }
.detail-val { font-size: 12px; color: #e2e8f0; text-align: right; font-weight: 500; }

/* RACE STRATEGY */
.race-hero { background: linear-gradient(135deg, #1a0800, #0f0f1a); border: 1px solid rgba(249,115,22,0.3); border-radius: 13px; padding: 18px; margin-bottom: 10px; text-align: center; }
.race-emoji { font-size: 36px; margin-bottom: 6px; }
.race-title { font-size: 28px; font-weight: 900; color: var(--orange); letter-spacing: -0.5px; }
.race-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.pace-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; margin-bottom: 10px; }
.pace-card-title { padding: 11px 14px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); border-bottom: 1px solid var(--border); font-weight: 700; }
.pace-seg { display: flex; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.pace-seg:last-child { border-bottom: none; }
.pace-miles { font-size: 12px; color: var(--muted); width: 72px; flex-shrink: 0; }
.pace-bar-wrap { flex: 1; height: 5px; background: #1e1e2e; border-radius: 3px; overflow: hidden; }
.pace-bar { height: 100%; border-radius: 3px; }
.pace-mph { font-size: 13px; font-weight: 800; width: 90px; text-align: right; flex-shrink: 0; }

/* TODAY CARD */
.today-card { margin-top: 14px; background: linear-gradient(135deg, #1a0800, #0f1525); border: 1px solid rgba(249,115,22,0.3); border-radius: 13px; padding: 14px; }
.today-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); font-weight: 700; margin-bottom: 7px; }
.today-row { display: flex; align-items: center; justify-content: space-between; }
.today-name { font-size: 17px; font-weight: 800; }
.today-details { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.today-hint { margin-top: 9px; padding: 7px 11px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
.hint-pending { background: rgba(249,115,22,0.1); color: #fdba74; }
.hint-done { background: rgba(34,197,94,0.1); color: #86efac; }
.rest-today { margin-top: 14px; background: #0f1118; border: 1px solid var(--border); border-radius: 13px; padding: 14px; text-align: center; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 10px; align-items: center; }
.nav-btn { flex: 1; padding: 11px; border-radius: 11px; border: none; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.nav-prev { background: #1e1e2e; color: var(--muted); }
.nav-next { background: var(--orange); color: #fff; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.dots { display: flex; align-items: center; gap: 4px; }
.dot { width: 6px; height: 6px; border-radius: 3px; background: #1e1e2e; cursor: pointer; transition: all 0.2s; }
.dot.active { width: 14px; background: var(--orange); }
.dot.current { background: var(--muted); }

/* ─── ONBOARDING ─────────────────────────────────────────────────────────── */
.onboard-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: none; align-items: center; justify-content: center;
  padding: 20px; overflow-y: auto;
}
.onboard-overlay.visible { display: flex; }
.onboard-card {
  width: 100%; max-width: 440px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px;
}
.ob-progress { display: flex; gap: 6px; margin-bottom: 22px; }
.ob-progress-dot { height: 4px; border-radius: 2px; background: var(--border); transition: all 0.2s; flex: 1; }
.ob-progress-dot.done { background: var(--orange); }
.ob-progress-dot.active { background: var(--orange2); }
.ob-step-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); font-weight: 700; margin-bottom: 6px; }
.ob-title { font-size: 22px; font-weight: 900; margin-bottom: 6px; line-height: 1.2; }
.ob-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
.ob-tiles { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.ob-tile {
  flex: 1; min-width: 90px; padding: 16px 10px;
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 12px; cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.ob-tile-icon { font-size: 22px; margin-bottom: 6px; }
.ob-tile-label { font-size: 12px; font-weight: 700; color: var(--text); }
.ob-tile-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.ob-tile.selected { border-color: var(--orange); background: rgba(249,115,22,0.1); }
.ob-tile.selected .ob-tile-label { color: var(--orange); }
.ob-tiles-sm { display: flex; gap: 8px; margin-bottom: 8px; }
.ob-tile-sm {
  flex: 1; padding: 12px 8px; background: var(--card2);
  border: 2px solid var(--border); border-radius: 10px;
  cursor: pointer; text-align: center; font-size: 13px;
  font-weight: 700; transition: all 0.15s;
}
.ob-tile-sm.selected { border-color: var(--orange); background: rgba(249,115,22,0.1); color: var(--orange); }
.ob-toggle-row { display: flex; gap: 0; margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.ob-toggle-btn {
  flex: 1; padding: 9px; background: var(--card2); border: none;
  color: var(--muted); font-family: inherit; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.ob-toggle-btn.active { background: rgba(249,115,22,0.15); color: var(--orange); }
.ob-input-wrap { position: relative; margin-bottom: 6px; }
.ob-input {
  width: 100%; padding: 13px 14px;
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 16px;
  font-family: inherit; outline: none; transition: border-color 0.15s;
}
.ob-input:focus { border-color: var(--orange); }
.ob-input.error { border-color: #ef4444; }
.ob-input-suffix {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 12px; color: var(--muted); font-weight: 600; pointer-events: none;
}
.ob-hint { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; }
.ob-error { color: #ef4444; font-size: 12px; margin-top: 6px; line-height: 1.5; display: none; }
.ob-warning {
  background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.25);
  color: #fde68a; border-radius: 10px; padding: 10px 13px;
  font-size: 12px; margin-top: 10px; line-height: 1.5; display: none;
}
.ob-info {
  background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25);
  color: #bfdbfe; border-radius: 10px; padding: 10px 13px;
  font-size: 12px; margin-top: 10px; line-height: 1.5; display: none;
}
.ob-weeks-display { font-size: 13px; color: var(--green); margin-top: 8px; font-weight: 600; }
.ob-nav { display: flex; gap: 10px; margin-top: 24px; }
.ob-btn-back {
  padding: 12px 20px; border-radius: 11px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--muted); font-family: inherit; font-size: 14px;
  font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.ob-btn-next {
  flex: 1; padding: 12px; border-radius: 11px;
  background: var(--orange); border: none; color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.ob-btn-next:disabled { opacity: 0.35; cursor: default; }
.ob-confirm-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ob-confirm-row:last-of-type { border-bottom: none; }
.ob-confirm-label { font-size: 12px; color: var(--muted); }
.ob-confirm-val { font-size: 12px; font-weight: 700; color: var(--text); text-align: right; }
.ob-generate-btn {
  width: 100%; margin-top: 20px; padding: 14px; border-radius: 12px;
  background: var(--orange); border: none; color: #fff;
  font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer;
}
</style>
</head>
<body>

<!-- ONBOARDING OVERLAY -->
<div class="onboard-overlay" id="onboarding">
  <div class="onboard-card" id="obCard"></div>
</div>

<!-- HEADER -->
<div class="header" style="position:relative">
  <button class="settings-btn" onclick="showSettings()" title="Reset plan">⚙</button>
  <div class="header-label" id="headerLabel">Training Tracker</div>
  <div class="header-row">
    <div>
      <div class="header-title" id="headerTitle">—</div>
      <div class="header-sub" id="headerSub">Set up your plan to get started</div>
    </div>
    <div>
      <div class="header-pct" id="pct">0%</div>
      <div class="header-pct-sub" id="runCount">0/0 runs</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="save-status" id="saveStatus"></div>
</div>

<!-- WEEK TABS -->
<div class="tabs" id="tabs"></div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn nav-prev" id="prevBtn" onclick="changeWeek(-1)">← Prev</button>
  <div class="dots" id="dots"></div>
  <button class="nav-btn nav-next" id="nextBtn" onclick="changeWeek(1)">Next →</button>
</div>

<script>
// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const EVENT_CONFIG = {
  "5k":   { label:"5K",            dist:5000,  minWeeks:6,  idealWeeks:10, peakLong:3.0,  startLong:1.5, raceDist:"3.1 mi",  trackerLabel:"5K Tracker" },
  "10k":  { label:"10K",           dist:10000, minWeeks:8,  idealWeeks:12, peakLong:6.0,  startLong:2.5, raceDist:"6.2 mi",  trackerLabel:"10K Tracker" },
  "half": { label:"Half Marathon", dist:21097, minWeeks:10, idealWeeks:14, peakLong:11.0, startLong:5.0, raceDist:"13.1 mi", trackerLabel:"Half Marathon Tracker" },
  "full": { label:"Marathon",      dist:42195, minWeeks:16, idealWeeks:20, peakLong:20.0, startLong:8.0, raceDist:"26.2 mi", trackerLabel:"Marathon Tracker" },
};

const RUN_DAY_PATTERNS = {
  3: ["Tue","Thu","Sat"],
  4: ["Mon","Wed","Fri","Sun"],
  5: ["Mon","Tue","Thu","Fri","Sun"],
};

const TYPE_CFG = {
  done:    { bg:"#0d1f0d", border:"#22c55e30" },
  easy:    { bg:"#0f1f12", border:"#22c55e25" },
  tempo:   { bg:"#1f1000", border:"#f9731625" },
  long:    { bg:"#0f1525", border:"#3b82f625" },
  prog:    { bg:"#150d25", border:"#a855f725" },
  strides: { bg:"#1a0f25", border:"#a855f720" },
  rest:    { bg:"#111118", border:"#33333340" },
  race:    { bg:"#1f0800", border:"#f9731640" },
};

// ─── VDOT ENGINE ─────────────────────────────────────────────────────────────
function pctVO2max(tMin) {
  return 0.8 + 0.1894393 * Math.exp(-0.012778 * tMin)
             + 0.2989558 * Math.exp(-0.1932605 * tMin);
}

function vo2AtVelocity(vMpm) {
  return -4.60 + 0.182258 * vMpm + 0.000104 * vMpm * vMpm;
}

function calcVDOT(distMeters, finishSeconds) {
  const tMin = finishSeconds / 60;
  const vMpm = distMeters / tMin;
  return vo2AtVelocity(vMpm) / pctVO2max(tMin);
}

function velocityAtPct(vdot, pct) {
  const targetVO2 = vdot * pct;
  const a = 0.000104, b = 0.182258, c = -4.60 - targetVO2;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return 0;
  return (-b + Math.sqrt(disc)) / (2 * a);
}

function mpmToMph(mpm) {
  return Math.round((mpm * 60 / 1609.344) * 10) / 10;
}

function calcTrainingPaces(vdot) {
  const zones = {
    easy:       { lo: 0.59, hi: 0.74 },
    marathon:   { lo: 0.75, hi: 0.84 },
    threshold:  { lo: 0.83, hi: 0.88 },
    interval:   { lo: 0.95, hi: 1.00 },
    repetition: { lo: 1.05, hi: 1.15 },
  };
  const paces = {};
  for (const [zone, range] of Object.entries(zones)) {
    paces[zone] = {
      mphLo: mpmToMph(velocityAtPct(vdot, range.lo)),
      mphHi: mpmToMph(velocityAtPct(vdot, range.hi)),
    };
  }
  return paces;
}

function fmtPace(p) {
  if (!p) return "—";
  if (p.mphLo === p.mphHi) return `${p.mphHi} mph`;
  return `${p.mphLo}–${p.mphHi} mph`;
}

function parseGoalToSeconds(inputType, rawValue, distMeters) {
  rawValue = rawValue.trim();
  if (inputType === "time") {
    const parts = rawValue.split(":").map(Number);
    if (parts.some(isNaN) || parts.length < 2) return NaN;
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    return parts[0]*60 + parts[1];
  }
  if (inputType === "mph") {
    const mph = parseFloat(rawValue);
    if (isNaN(mph) || mph <= 0) return NaN;
    const mpm = mph * 1609.344 / 60;
    return (distMeters / mpm) * 60;
  }
  if (inputType === "minpermile") {
    const parts = rawValue.split(":").map(Number);
    if (parts.length < 2 || parts.some(isNaN)) return NaN;
    const secPerMile = parts[0]*60 + parts[1];
    return secPerMile * (distMeters / 1609.344);
  }
  return NaN;
}

function formatSeconds(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.round(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}

// ─── PLAN GENERATOR ──────────────────────────────────────────────────────────
function calcPhases(totalWeeks) {
  const training = totalWeeks - 1;
  const taper = Math.max(1, Math.round(training * 0.10));
  const peak  = Math.max(1, Math.round(training * 0.15));
  const base  = Math.max(2, Math.round(training * 0.30));
  const build = Math.max(1, training - taper - peak - base);
  return { base, build, peak, taper, race: 1 };
}

function buildLongRunProgression(trainingWeeks, startDist, peakDist, phases) {
  const dists = [];
  let current = startDist;
  const taperStart = phases.base + phases.build + phases.peak;

  for (let i = 0; i < trainingWeeks; i++) {
    if (i >= taperStart) {
      const tw = i - taperStart;
      const frac = 1 - (tw + 1) / (phases.taper + 1) * 0.40;
      dists.push(Math.max(Math.round(peakDist * frac * 2) / 2, startDist));
    } else {
      const isCutback = (i + 1) % 4 === 0 && i < taperStart - 1;
      if (isCutback) {
        const cb = Math.round(current * 0.75 * 2) / 2;
        dists.push(cb);
        current = cb;
      } else if (current >= peakDist) {
        dists.push(peakDist);
      } else {
        const next = Math.min(Math.round(current * 1.10 * 2) / 2, peakDist);
        dists.push(next);
        current = next;
      }
    }
  }
  return dists;
}

function phaseForWeek(weekIdx, phases) {
  if (weekIdx < phases.base) return "base";
  if (weekIdx < phases.base + phases.build) return "build";
  if (weekIdx < phases.base + phases.build + phases.peak) return "peak";
  return "taper";
}

function assignRunTypes(phase, numRuns, isCutback) {
  const types = Array(numRuns).fill("easy");
  types[numRuns - 1] = "long";
  if (!isCutback && (phase === "build" || phase === "peak")) {
    if (numRuns >= 3) types[numRuns - 2] = "tempo";
    if (numRuns >= 5) types[1] = "strides";
  }
  if (!isCutback && phase === "taper") {
    if (numRuns >= 3) types[numRuns - 2] = "strides";
  }
  return types;
}

function assignEasyDist(experience, phase, weekNum, totalWeeks) {
  const mult = { beginner: 0.8, intermediate: 1.0, advanced: 1.25 }[experience] || 1.0;
  const prog = weekNum / totalWeeks;
  const base = 2.5 + prog * 1.5;
  return Math.round(base * mult * 2) / 2;
}

function assignTempoDist(experience, phase, weekNum, totalWeeks) {
  const mult = { beginner: 0.8, intermediate: 1.0, advanced: 1.25 }[experience] || 1.0;
  const prog = weekNum / totalWeeks;
  const base = 2.5 + prog * 2.5;
  return Math.round(base * mult * 2) / 2;
}

function buildStructure(runType, dist, paces) {
  if (runType === "tempo") {
    const wu = 1.0, cd = 0.5;
    const quality = Math.max(1.0, Math.round((dist - wu - cd) * 2) / 2);
    return [
      `${wu} mi warm-up @ ${paces.easy.mphHi} mph`,
      `${quality} mi @ ${fmtPace(paces.threshold)} (tempo pace)`,
      `${cd} mi cool-down @ ${paces.easy.mphHi} mph`,
    ];
  }
  if (runType === "strides") {
    const easyMi = Math.max(1.5, dist - 0.3);
    return [
      `${easyMi} mi easy @ ${fmtPace(paces.easy)}`,
      `4 × 20 sec @ ${paces.repetition.mphLo} mph`,
      "60 sec walk recovery between strides",
    ];
  }
  if (runType === "prog") {
    const thirds = Math.floor(dist / 3);
    const mid = Math.floor(dist * 2 / 3);
    return [
      `Mi 1–${thirds} @ ${fmtPace(paces.easy)}`,
      `Mi ${thirds+1}–${mid} @ ${fmtPace(paces.marathon)}`,
      `Mi ${mid+1}–${dist} @ ${fmtPace(paces.threshold)}`,
    ];
  }
  return null;
}

function genWeekGoal(phase, isCutback) {
  if (isCutback) return "Recovery week — do NOT add miles";
  if (phase === "base") return "Build your aerobic base — keep every run easy";
  if (phase === "build") return "Build quality and endurance — controlled effort";
  if (phase === "peak") return "Peak week — your biggest confidence builder";
  if (phase === "taper") return "Arrive at race week fresh, not flat";
  return "Stay consistent";
}

function genRunNote(runType, phase) {
  if (runType === "tempo") return "Hard but controlled — you should be able to say a few words";
  if (runType === "easy") return "If you can't hold a conversation, slow down";
  if (runType === "long" && phase === "peak") return "Start conservatively, finish strong";
  if (runType === "long") return "Even effort — long runs build the aerobic engine";
  if (runType === "strides") return "Keep these short and sharp — controlled acceleration";
  return "";
}

function buildRaceWeek(weekNum, config) {
  const ev = EVENT_CONFIG[config.event];
  const raceDate = new Date(config.raceDateISO);
  const dateLabel = raceDate.toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
  const p = config.paces;
  return {
    num: weekNum, label: "RACE 🏁", tag: "RACE DAY",
    goal: "Stay calm, stay loose, trust everything you've done",
    total: ev.raceDist, isRaceWeek: true,
    raceDate: dateLabel, eventLabel: ev.label, goalDisplay: config.goalDisplay, paces: p,
    runs: [
      { id:`${weekNum}-1`, day:"Mon", name:"Shakeout Run", dist:"2 mi", type:"easy", speed:fmtPace(p.easy), details:{notes:"Light and easy — shake out the taper legs"} },
      { id:`${weekNum}-2`, day:"Tue", name:"Rest", dist:"—", type:"rest", speed:"—" },
      { id:`${weekNum}-3`, day:"Wed", name:"Shakeout + Strides", dist:"2 mi", type:"strides",
        speed:`${p.easy.mphHi} + ${p.repetition.mphLo} mph`,
        structure:[`Easy 2 mi @ ${fmtPace(p.easy)}`, `3 × 20 sec strides @ ${p.repetition.mphLo} mph`, "Full recovery between strides"], details:{} },
      { id:`${weekNum}-4`, day:"Thu", name:"Rest", dist:"—", type:"rest", speed:"—" },
      { id:`${weekNum}-5`, day:"Fri/Sat", name:"Rest + Carb Load", dist:"—", type:"rest", speed:"—",
        details:{notes:"Lay out gear, eat carb-rich dinner, hydrate all day"} },
      { id:`${weekNum}-6`, day:"Race Day", name:"🏁 RACE DAY", dist:ev.raceDist, type:"race",
        speed:`${p.easy.mphHi} → ${p.threshold.mphHi} → all out`,
        structure:[
          `First third @ ${fmtPace(p.easy)} (conservative — let people pass)`,
          `Middle third @ ${fmtPace(p.threshold)} (goal pace)`,
          `Final third @ everything you have left`,
        ],
        details:{notes:"The race begins in the last third. Start easy, finish strong."} }
    ]
  };
}

function generatePlan(config) {
  const ev = EVENT_CONFIG[config.event];
  const { paces, experience, runsPerWeek, totalWeeks, planStartISO } = config;
  const trainingWeeks = totalWeeks - 1;
  const phases = calcPhases(totalWeeks);
  const days = RUN_DAY_PATTERNS[runsPerWeek];
  const longRunDists = buildLongRunProgression(trainingWeeks, ev.startLong, ev.peakLong, phases);

  const WEEKS = [];

  for (let i = 0; i < trainingWeeks; i++) {
    const weekNum = i + 1;
    const phase = phaseForWeek(i, phases);
    const isCutback = (i + 1) % 4 === 0 && i < trainingWeeks - phases.taper - 1;
    const longDist = longRunDists[i];
    const runTypes = assignRunTypes(phase, runsPerWeek, isCutback);

    const runs = [];
    let totalDist = 0;

    runTypes.forEach((runType, slot) => {
      const day = days[slot];
      let dist;
      if (runType === "long") dist = longDist;
      else if (runType === "tempo") dist = assignTempoDist(experience, phase, weekNum, trainingWeeks);
      else dist = assignEasyDist(experience, phase, weekNum, trainingWeeks);

      totalDist += dist;
      const id = `${weekNum}-${slot+1}`;

      const isProgRun = runType === "long" && (phase === "peak");
      const effectiveType = isProgRun ? "prog" : runType;

      let speed;
      if (runType === "easy") speed = fmtPace(paces.easy);
      else if (runType === "long") speed = phase === "peak" ? `→ ${fmtPace(paces.threshold)}` : fmtPace(paces.easy);
      else if (runType === "tempo") speed = fmtPace(paces.threshold);
      else if (runType === "strides") speed = `${paces.easy.mphHi} + ${paces.repetition.mphLo} mph`;
      else speed = "—";

      const structure = buildStructure(isProgRun ? "prog" : runType, dist, paces);
      const nameMap = {
        easy: "Easy Run",
        long: phase === "peak" ? "Progressive Long Run" : "Long Run",
        tempo: "Tempo Run",
        strides: "Easy + Strides",
      };

      runs.push({
        id, day,
        name: nameMap[runType] || "Easy Run",
        dist: `${dist} mi`,
        type: effectiveType,
        speed,
        structure: structure || undefined,
        details: { notes: genRunNote(runType, phase) },
      });
    });

    const tag = isCutback ? "CUTBACK" : phase === "taper" ? "TAPER" : null;

    WEEKS.push({
      num: weekNum,
      label: `WK ${String(weekNum).padStart(2,"0")}`,
      tag,
      goal: genWeekGoal(phase, isCutback),
      total: `~${Math.round(totalDist * 10) / 10} mi`,
      runs,
    });
  }

  WEEKS.push(buildRaceWeek(totalWeeks, config));
  return WEEKS;
}

function obValidateGoal() {
  const ev = EVENT_CONFIG[obState.event];
  const secs = parseGoalToSeconds(obState.goalType, obState.goalValue, ev.dist);
  const errEl = document.getElementById("goalError");
  const nextBtn = document.getElementById("goalNextBtn");

  if (!obState.goalValue || isNaN(secs) || secs <= 0) {
    if (errEl) { errEl.style.display = "none"; }
    if (nextBtn) nextBtn.disabled = true;
    return;
  }

  const vdot = calcVDOT(ev.dist, secs);
  const worldRecordSecs = {"5k":757,"10k":1573,"half":3544,"full":7299}[obState.event];

  if (secs < worldRecordSecs * 0.70) {
    if (errEl) { errEl.textContent = "That goal is faster than world-record pace. Please double-check your input."; errEl.style.display = "block"; }
    if (nextBtn) nextBtn.disabled = true;
    return;
  }
  if (vdot < 18) {
    if (errEl) { errEl.textContent = "That pace is very slow — try entering a more realistic goal time."; errEl.style.display = "block"; }
    if (nextBtn) nextBtn.disabled = true;
    return;
  }

  if (errEl) errEl.style.display = "none";
  if (nextBtn) nextBtn.disabled = false;
}

function calcAvailableWeeks(raceDateISO) {
  const race = new Date(raceDateISO);
  const today = new Date();
  today.setHours(0,0,0,0);
  // Start next Monday
  const dow = today.getDay();
  const daysToMon = dow === 1 ? 0 : dow === 0 ? 1 : 8 - dow;
  const planStart = new Date(today);
  planStart.setDate(today.getDate() + daysToMon);
  const diffDays = Math.floor((race - planStart) / (1000*60*60*24));
  return Math.max(0, Math.floor(diffDays / 7));
}

function calcPlanTiming(raceDateISO, event) {
  const ev = EVENT_CONFIG[event];
  const available = calcAvailableWeeks(raceDateISO);
  const totalWeeks = Math.min(available, ev.idealWeeks);
  const raceDate = new Date(raceDateISO);
  const planStart = new Date(raceDate);
  planStart.setDate(raceDate.getDate() - totalWeeks * 7);
  // Snap to Monday
  const dow = planStart.getDay();
  if (dow !== 1) planStart.setDate(planStart.getDate() + ((8 - dow) % 7));
  return { totalWeeks, planStartISO: planStart.toISOString().split("T")[0], availableWeeks: available };
}

function obValidateDate() {
  const ev = EVENT_CONFIG[obState.event];
  const warnEl = document.getElementById("dateWarning");
  const infoEl = document.getElementById("dateInfo");
  const weeksEl = document.getElementById("weeksDisplay");
  const nextBtn = document.getElementById("dateNextBtn");
  if (!warnEl || !infoEl || !weeksEl || !nextBtn) return;

  if (!obState.raceDateISO) {
    warnEl.style.display="none"; infoEl.style.display="none"; weeksEl.style.display="none";
    nextBtn.disabled = true; return;
  }

  const raceDate = new Date(obState.raceDateISO);
  const today = new Date(); today.setHours(0,0,0,0);
  if (raceDate <= today) {
    warnEl.textContent = "Race date must be in the future."; warnEl.style.display="block";
    infoEl.style.display="none"; weeksEl.style.display="none"; nextBtn.disabled=true; return;
  }

  const available = calcAvailableWeeks(obState.raceDateISO);
  if (available < ev.minWeeks) {
    warnEl.textContent = `Only ${available} week${available!==1?"s":""} until race day — a ${ev.label} plan needs at least ${ev.minWeeks}. Try a later date or switch to a shorter event.`;
    warnEl.style.display="block"; infoEl.style.display="none"; weeksEl.style.display="none"; nextBtn.disabled=true; return;
  }

  warnEl.style.display="none";
  const useWeeks = Math.min(available, ev.idealWeeks);
  weeksEl.textContent = `✓ ${useWeeks}-week plan`;
  weeksEl.style.display="block";

  if (available > ev.idealWeeks) {
    infoEl.textContent = `You have ${available} weeks — we'll use an optimal ${ev.idealWeeks}-week plan. Use the extra ${available - ev.idealWeeks} weeks to run easy and build base fitness.`;
    infoEl.style.display="block";
  } else {
    infoEl.style.display="none";
  }
  nextBtn.disabled = false;
}

function obNext() {
  if (obState.step < 5) { obState.step++; renderObStep(); }
}
function obBack() {
  if (obState.step > 1) { obState.step--; renderObStep(); }
}

function finishOnboarding() {
  const ev = EVENT_CONFIG[obState.event];
  const finishSecs = parseGoalToSeconds(obState.goalType, obState.goalValue, ev.dist);
  const vdot = calcVDOT(ev.dist, finishSecs);
  const paces = calcTrainingPaces(vdot);
  const { totalWeeks, planStartISO } = calcPlanTiming(obState.raceDateISO, obState.event);

  let goalDisplay;
  if (obState.goalType === "time") goalDisplay = obState.goalValue;
  else if (obState.goalType === "mph") goalDisplay = `${obState.goalValue} mph`;
  else goalDisplay = `${obState.goalValue}/mi`;

  const config = {
    version: 1,
    event: obState.event,
    goalSeconds: finishSecs,
    goalDisplay,
    goalFinishFormatted: formatSeconds(finishSecs),
    vdot: Math.round(vdot * 10) / 10,
    paces,
    experience: obState.experience,
    runsPerWeek: obState.runsPerWeek,
    raceDateISO: obState.raceDateISO,
    planStartISO,
    totalWeeks,
    generatedAt: Date.now(),
  };

  saveConfig(config);
  completed = {};
  saveProgress();
  hideOnboarding();
  bootApp(config);
}

  showOnboarding();
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let WEEKS = [];
let activeWeek = 0;
let completed = {};
let expanded = {};
let currentConfig = null;

function getCurrentWeekIndex() {
  if (!currentConfig) return 0;
  const planStart = new Date(currentConfig.planStartISO);
  const now = new Date();
  const diff = Math.floor((now - planStart) / (7*24*60*60*1000));
  return Math.max(0, Math.min(diff, WEEKS.length - 1));
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const allRuns = WEEKS.flatMap(w => w.runs.filter(r => r.type !== "rest"));
  const done = allRuns.filter(r => completed[r.id] || r.readonly).length;
  const pct = allRuns.length ? Math.round(done / allRuns.length * 100) : 0;
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("runCount").textContent = done + "/" + allRuns.length + " runs";
  document.getElementById("progressFill").style.width = pct + "%";
}

function showSave(msg, color) {
  const el = document.getElementById("saveStatus");
  el.textContent = msg; el.style.color = color; el.style.opacity = "1";
  setTimeout(() => { el.style.opacity = "0"; }, 1500);
}

// ─── TOGGLE ──────────────────────────────────────────────────────────────────
function toggleRun(id) {
  completed[id] = !completed[id];
  saveProgress(); updateStats(); renderWeek(activeWeek);
}
function toggleExpand(id) {
  expanded[id] = !expanded[id];
  renderWeek(activeWeek);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderHeader(config) {
  const ev = EVENT_CONFIG[config.event];
  const raceDate = new Date(config.raceDateISO);
  const dateStr = raceDate.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  document.getElementById("headerLabel").textContent = ev.trackerLabel;
  document.getElementById("headerTitle").textContent = `${dateStr} 🏁`;
  document.getElementById("headerSub").textContent = `Goal: ${config.goalFinishFormatted} · ${config.paces.threshold.mphLo} mph tempo`;
}

function renderTabs() {
  const curIdx = getCurrentWeekIndex();
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  WEEKS.forEach((w, i) => {
    const isActive = i === activeWeek;
    const isCurrent = i === curIdx;
    const weekDone = w.runs.filter(r => r.type !== "rest").every(r => completed[r.id] || r.readonly);
    const btn = document.createElement("button");
    btn.className = "tab" + (isActive ? " active" : "") + (isCurrent && !isActive ? " current-dot" : "");
    btn.innerHTML = w.label + (weekDone ? '<span class="tab-done">✓</span>' : "");
    btn.onclick = () => showWeek(i);
    tabsEl.appendChild(btn);
  });

  const dotsEl = document.getElementById("dots");
  dotsEl.innerHTML = "";
  WEEKS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === activeWeek ? " active" : i === curIdx ? " current" : "");
    d.onclick = () => showWeek(i);
    dotsEl.appendChild(d);
  });

  document.getElementById("prevBtn").disabled = activeWeek === 0;
  document.getElementById("nextBtn").disabled = activeWeek === WEEKS.length - 1;
}

function segDotColor(seg) {
  const l = seg.toLowerCase();
  if (l.includes("easy") || l.includes("warm-up") || l.includes("cool-down")) return "#22c55e";
  if (l.includes("tempo") || l.includes("threshold") || l.includes("goal pace")) return "#f97316";
  if (l.includes("strides") || l.includes("interval") || l.includes("all out")) return "#a855f7";
  return "#3b82f6";
}

function renderWeek(idx) {
  const w = WEEKS[idx];
  const curIdx = getCurrentWeekIndex();
  const isCurrent = idx === curIdx;
  const dayMap = {0:"Sun",1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat"};
  const today = dayMap[new Date().getDay()];

  let html = `<div class="wk-header">
    <div class="wk-title-row">
      <div class="wk-title">${w.isRaceWeek ? "Race Week" : "Week " + w.num}</div>
      ${w.tag ? `<span class="badge badge-${w.tag==="CUTBACK"?"cutback":w.tag==="TAPER"?"taper":"race"}">${w.tag}</span>` : ""}
      ${isCurrent ? `<span class="badge badge-current">THIS WEEK</span>` : ""}
    </div>
    <div class="wk-goal">${w.goal}</div>
    <div class="wk-total">Total: ${w.total}</div>
  </div>`;

  if (w.tag === "CUTBACK") html += `<div class="alert alert-yellow">⚡ Your body gets stronger during recovery. <strong>Do not add miles this week.</strong></div>`;
  if (w.tag === "TAPER") html += `<div class="alert alert-blue">🌊 You'll feel sluggish — that's normal taper fatigue. The work is done. <strong>Trust it.</strong></div>`;

  w.runs.forEach(run => {
    const cfg = TYPE_CFG[run.type] || TYPE_CFG.easy;
    const isChecked = completed[run.id] || run.readonly;
    const isOpen = expanded[run.id];
    const isRest = run.type === "rest";
    const hasDetails = run.details && Object.keys(run.details).filter(k => run.details[k]).length > 0;
    const canExpand = (run.structure && run.structure.length) || hasDetails || run.hr_note;

    html += `<div class="run-card${isRest?" rest":""}" style="background:${isChecked&&!isRest?"#0d1f0d":cfg.bg};border:1px solid ${isChecked&&!isRest?"#22c55e35":cfg.border}">`;
    html += `<div class="run-card-top" onclick="${canExpand?`toggleExpand('${run.id}')`:""}" style="${!canExpand?"cursor:default":""}">`;

    if (isRest) {
      html += `<div class="rest-icon">😴</div>`;
    } else {
      html += `<div class="run-checkbox${isChecked?" checked":""}${run.readonly?" readonly":""}" onclick="event.stopPropagation();${run.readonly?"":` toggleRun('${run.id}')`}">${isChecked?"✓":""}</div>`;
    }

    html += `<div class="run-info">
      <div class="run-day">${run.day}</div>
      <div class="run-name${isChecked&&!run.readonly?" crossed":""}">${run.name}</div>
      <div class="run-dist${run.type==="race"?" race-dist":""}">${run.dist}</div>
    </div>`;

    html += `<div class="run-right">`;
    if (run.speed && run.speed !== "—") html += `<div class="run-speed">${run.speed}</div>`;
    if (canExpand) html += `<div class="expand-btn${isOpen?" open":""}">▾</div>`;
    html += `</div></div>`;

    if (isOpen && canExpand) {
      html += `<div class="run-detail"><div class="run-detail-inner">`;
      if (run.structure) {
        html += `<div class="structure-block">`;
        run.structure.forEach(seg => {
          html += `<div class="seg-row"><div class="seg-dot" style="background:${segDotColor(seg)}"></div><div class="seg-text">${seg}</div></div>`;
        });
        html += `</div>`;
      }
      if (run.details) {
        Object.entries(run.details).forEach(([k,v]) => {
          if (v) html += `<div class="detail-row"><div class="detail-label">${k}</div><div class="detail-val">${v}</div></div>`;
        });
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  });

  // Race week strategy card
  if (w.isRaceWeek) {
    const p = w.paces;
    html += `<div class="race-hero"><div class="race-emoji">🏁</div>
      <div class="race-title">${w.raceDate}</div>
      <div class="race-sub">${w.eventLabel} · Goal: ${w.goalDisplay}</div>
    </div>`;
    html += `<div class="pace-card"><div class="pace-card-title">Race Pacing Strategy</div>`;
    [
      {seg:"First third",  mph:`${p.easy.mphHi} mph`,                color:"#22c55e", w:"50%"},
      {seg:"Middle third", mph:fmtPace(p.threshold),                  color:"#f97316", w:"78%"},
      {seg:"Final third",  mph:"All out",                              color:"#a855f7", w:"100%"},
    ].forEach(r => {
      html += `<div class="pace-seg"><div class="pace-miles">${r.seg}</div><div class="pace-bar-wrap"><div class="pace-bar" style="width:${r.w};background:${r.color}"></div></div><div class="pace-mph" style="color:${r.color}">${r.mph}</div></div>`;
    });
    html += `<div style="padding:10px 14px;font-size:12px;color:#fdba74;background:rgba(249,115,22,0.06);line-height:1.6"><strong>Key rule:</strong> Start conservative — the race begins in the final third.</div></div>`;
  }

  // Today card
  if (isCurrent) {
    const todayRun = w.runs.find(r => {
      if (r.day === "Sat/Sun" && (today==="Sat"||today==="Sun")) return true;
      if (r.day === "Fri/Sat" && (today==="Fri"||today==="Sat")) return true;
      return r.day === today;
    });
    if (!todayRun || todayRun.type === "rest") {
      html += `<div class="rest-today"><div style="font-size:26px">😴</div><div style="font-size:14px;font-weight:700;margin-top:6px">Rest Day — ${today}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">No run scheduled. Recovery is training too.</div></div>`;
    } else {
      const isChecked = completed[todayRun.id] || todayRun.readonly;
      html += `<div class="today-card">
        <div class="today-label">📍 Today's Run — ${today}</div>
        <div class="today-row">
          <div><div class="today-name">${todayRun.name}</div><div class="today-details">${todayRun.dist} · ${todayRun.speed}</div></div>
          <div style="font-size:22px">${isChecked?"✅":"👟"}</div>
        </div>
        <div class="today-hint ${isChecked?"hint-done":"hint-pending"}">
          ${isChecked?"Great work! Run logged ✓":"Tap the checkbox on the card above when you're done!"}
        </div>
      </div>`;
    }
  }

  document.getElementById("content").innerHTML = `<div class="week-panel active">${html}</div>`;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showWeek(n) {
  activeWeek = n;
  renderTabs();
  renderWeek(n);
  window.scrollTo({top:0, behavior:"smooth"});
  const tabs = document.querySelectorAll(".tab");
  if (tabs[n]) tabs[n].scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
}

function changeWeek(dir) {
  const next = activeWeek + dir;
  if (next >= 0 && next < WEEKS.length) showWeek(next);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
function bootApp(config) {
  currentConfig = config;
  WEEKS = generatePlan(config);
  renderHeader(config);
  activeWeek = getCurrentWeekIndex();
  updateStats();
  renderTabs();
  renderWeek(activeWeek);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  // Migrate old key
  if (localStorage.getItem("hm-v2")) localStorage.removeItem("hm-v2");

  const config = loadConfig();
  if (!config) { showOnboarding(); return; }

  loadProgress();
  bootApp(config);
}

init();
</script>

</html>
